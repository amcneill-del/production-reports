<title>Perio-Referral Lab Playbook — 2026</title>
<style>
:root {
  --green:#22c55e;--green-bg:#f0fdf4;--green-border:#bbf7d0;

  --red:#ef4444;--red-bg:#fef2f2;--red-border:#fecaca;

  --purple:#8b5cf6;--purple-bg:#f5f3ff;

  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--g50);color:var(--g800);line-height:1.6;}

/* TABS NAV */
.tab-bar{position:sticky;top:0;z-index:100;background:var(--g900);display:flex;flex-wrap:wrap;gap:0;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.tab-bar button{background:transparent;color:#94a3b8;border:none;padding:10px 16px;font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;}
.tab-bar button:hover{color:#e2e8f0;background:rgba(255,255,255,.05);}
.tab-bar button.active{color:#fff;border-bottom-color:var(--blue);background:rgba(59,130,246,.15);}

.tab-content{display:none;padding:32px 20px;max-width:1320px;margin:0 auto;}
.tab-content.active{display:block;}

/* HERO */
.hero{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);color:#fff;border-radius:var(--r);padding:40px 36px;margin-bottom:36px;}
.hero h1{font-size:1.8rem;margin-bottom:6px;}
.hero p{color:#94a3b8;font-size:1rem;}

/* SECTION */
section{margin-bottom:40px;}
section>h2{font-size:1.35rem;color:var(--g900);margin-bottom:6px;padding-bottom:8px;border-bottom:2px solid var(--g200);}
section>p.sub{color:var(--g600);font-size:.9rem;margin-bottom:18px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.kpi{background:#fff;border-radius:var(--r);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.kpi .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--g600);margin-bottom:2px;}
.kpi .val{font-size:1.5rem;font-weight:700;color:var(--g900);}
.kpi .note{font-size:.78rem;color:var(--g600);margin-top:3px;}
.kpi.pass{border-left:4px solid var(--green);}
.kpi.warn{border-left:4px solid var(--yellow);}
.kpi.fail{border-left:4px solid var(--red);}
.kpi.neutral{border-left:4px solid var(--blue);}

/* TABLES */
.tw{overflow-x:auto;margin-bottom:20px;border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.08);}
table{width:100%;border-collapse:collapse;font-size:.83rem;background:#fff;}
th{background:var(--g900);color:#fff;padding:9px 12px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0;}
td{padding:9px 12px;border-bottom:1px solid var(--g100);white-space:nowrap;}
tr:hover td{background:var(--blue-bg);}
.pass-cell{background:var(--green-bg);color:#166534;font-weight:600;}
.warn-cell{background:var(--yellow-bg);color:#854d0e;font-weight:600;}
.fail-cell{background:var(--red-bg);color:#991b1b;font-weight:600;}

/* ACTION CARDS */
.dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
@media(max-width:900px){.dept-grid{grid-template-columns:1fr;}}
.dept-card{background:#fff;border-radius:var(--r);padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:4px solid var(--blue);}
.dept-card.marketing{border-top-color:#8b5cf6;}
.dept-card.operations{border-top-color:#f97316;}
.dept-card.clinical{border-top-color:#06b6d4;}
.dept-card.staff{border-top-color:#22c55e;}
.dept-card h3{font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.dept-card h3 .icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:700;}
.dept-card.marketing h3 .icon{background:#8b5cf6;}
.dept-card.operations h3 .icon{background:#f97316;}
.dept-card.clinical h3 .icon{background:#06b6d4;}
.dept-card.staff h3 .icon{background:#22c55e;}
.dept-card ul{padding-left:18px;margin:0;}
.dept-card li{font-size:.88rem;color:var(--g700);margin-bottom:8px;line-height:1.5;}
.dept-card li strong{color:var(--g900);}

.pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.73rem;font-weight:600;}
.pill-g{background:var(--green-bg);color:#166534;border:1px solid var(--green-border);}
.pill-y{background:var(--yellow-bg);color:#854d0e;border:1px solid var(--yellow-border);}
.pill-r{background:var(--red-bg);color:#991b1b;border:1px solid var(--red-border);}

.insight{background:#fff;border-left:4px solid var(--blue);border-radius:var(--r);padding:18px 22px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.insight h4{color:var(--blue);font-size:.92rem;margin-bottom:4px;}
.insight.alert{border-left-color:var(--red);} .insight.alert h4{color:var(--red);}
.insight.success{border-left-color:var(--green);} .insight.success h4{color:#16a34a;}
.insight p,.insight li{font-size:.88rem;color:var(--g700);}
.insight ul{padding-left:18px;margin-top:4px;}

canvas{width:100%!important;height:280px!important;}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
@media(max-width:900px){.chart-row{grid-template-columns:1fr;}}
.chart-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.chart-card h3{font-size:.95rem;margin-bottom:14px;color:var(--g800);}

.footer{text-align:center;padding:36px 20px;color:var(--g600);font-size:.8rem;}
</style>

    type:'bar',data:{labels:offices,datasets:[{label:'12m Referrals',data:D.ref12m,backgroundColor:cl.blue}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });

  new Chart(document.getElementById('c2'),{
    type:'bar',data:{labels:offices,datasets:[{label:'YoY %',data:D.refChange,backgroundColor:D.refChange.map(v=>v>=5?cl.green:v>=0?cl.orange:cl.red)}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v+'%'}}}}
  });

  new Chart(document.getElementById('c3'),{
    type:'bar',data:{labels:offices,datasets:[
      {label:'Schedule Rate %',data:D.schedRate,backgroundColor:cl.blue},
      {label:'Presented %',data:D.presented,backgroundColor:cl.orange},
      {label:'Case Accept %',data:D.caseAccept,backgroundColor:cl.green}
    ]},options:{responsive:true,scales:{y:{beginAtZero:true,max:100}}}
  });

  new Chart(document.getElementById('c4'),{
    type:'bar',data:{labels:offices,datasets:[{label:'PPH',data:D.pph,backgroundColor:D.pph.map(v=>v>=550000?cl.green:v>=400000?cl.orange:cl.red)}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K'}}}}
  });

  new Chart(document.getElementById('c5'),{
    type:'bar',data:{labels:offices,datasets:[{label:'Case Value',data:D.caseValue,backgroundColor:D.caseValue.map(v=>v>=7000?cl.green:v>=5000?cl.orange:cl.red)}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString()}}}}
  });

  new Chart(document.getElementById('c6'),{
    type:'bar',data:{labels:offices,datasets:[{label:'Health Score',data:D.healthScore,backgroundColor:D.healthScore.map(v=>v>=3.3?cl.green:v>=3?cl.orange:cl.red)}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:5}}}
  });
},100);
</script>
</body>
